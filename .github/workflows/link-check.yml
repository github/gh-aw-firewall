name: Link Check

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'
      - '.github/lychee.toml'
  schedule:
    # Run weekly on Wednesdays at 06:00 UTC
    - cron: '0 6 * * 3'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    name: Check Documentation Links
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.3.0
        with:
          args: >-
            --config .github/lychee.toml
            --no-progress
            '**/*.md'
          fail: true
