name: Performance Monitor

on:
  schedule:
    # Run weekly on Mondays at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      iterations:
        description: "Number of iterations per metric"
        required: false
        default: "5"

permissions:
  contents: read
  issues: write

jobs:
  benchmark:
    name: Run Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install AWF locally
        run: |
          sudo tee /usr/local/bin/awf > /dev/null <<'WRAPPER'
          #!/bin/bash
          exec node "${{ github.workspace }}/dist/cli.js" "$@"
          WRAPPER
          sudo chmod +x /usr/local/bin/awf

      - name: Restore benchmark history
        uses: actions/cache/restore@v4
        with:
          path: benchmark-history.json
          key: benchmark-history-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            benchmark-history-${{ github.ref_name }}-
            benchmark-history-main-

      - name: Run benchmarks
        id: benchmark
        run: |
          BASELINE_ARG=""
          if [ -f benchmark-history.json ]; then
            BASELINE_ARG="--baseline benchmark-history.json"
          fi
          npx tsx scripts/ci/benchmark-performance.ts $BASELINE_ARG > benchmark-results.json 2>benchmark-progress.log || true
          cat benchmark-progress.log
          echo "--- JSON output ---"
          cat benchmark-results.json

      - name: Update benchmark history
        run: |
          npx tsx scripts/ci/update-benchmark-history.ts benchmark-results.json benchmark-history.json

      - name: Save benchmark history
        uses: actions/cache/save@v4
        with:
          path: benchmark-history.json
          key: benchmark-history-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: |
            benchmark-results.json
            benchmark-progress.log
            benchmark-history.json
          retention-days: 90

      - name: Validate benchmark JSON
        run: |
          if [ ! -s benchmark-results.json ]; then
            echo "ERROR: benchmark-results.json is empty"
            exit 1
          fi
          if ! jq empty benchmark-results.json 2>/dev/null; then
            echo "ERROR: benchmark-results.json is not valid JSON"
            cat benchmark-results.json
            exit 1
          fi

      - name: Check for regressions
        id: check
        run: |
          if [ ! -f benchmark-results.json ]; then
            echo "No benchmark results found"
            exit 1
          fi

          REGRESSIONS=$(jq -r '.regressions | length' benchmark-results.json)
          echo "regression_count=$REGRESSIONS" >> "$GITHUB_OUTPUT"

          if [ "$REGRESSIONS" -gt 0 ]; then
            echo "## Performance Regressions Detected" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            jq -r '.regressions[]' benchmark-results.json | while read -r line; do
              echo "- $line" >> "$GITHUB_STEP_SUMMARY"
            done
          else
            echo "## All Metrics Within Thresholds" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Mean | Median | P95 | P99 | Target | Critical | Trend |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|------|--------|-----|-----|--------|----------|-------|" >> "$GITHUB_STEP_SUMMARY"

          # Build trend data from history if available
          if [ -f benchmark-history.json ]; then
            HISTORY_COUNT=$(jq '.entries | length' benchmark-history.json)
          else
            HISTORY_COUNT=0
          fi

          jq -r --argjson hcount "$HISTORY_COUNT" '.results[] as $r | .thresholds[$r.metric] as $t |
            "| \($r.metric) | \($r.mean)\($r.unit) | \($r.median)\($r.unit) | \($r.p95)\($r.unit) | \($r.p99)\($r.unit) | \($t.target // "N/A")\(if $t then $r.unit else "" end) | \($t.critical // "N/A")\(if $t then $r.unit else "" end) | \(if $hcount > 1 then "see log" else "N/A (first run)" end) |"' \
            benchmark-results.json >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "*History: ${HISTORY_COUNT} data points*" >> "$GITHUB_STEP_SUMMARY"

      - name: Ensure labels exist
        if: steps.check.outputs.regression_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'needs-investigation', color: 'e4e669', description: 'Requires further investigation' },
              { name: 'performance', color: 'd4c5f9', description: 'Performance related' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, ...label });
                core.info(`Created label: ${label.name}`);
              } catch (e) {
                if (e.status === 422) {
                  core.info(`Label already exists: ${label.name}`);
                } else {
                  throw e;
                }
              }
            }

      - name: Create regression issue
        if: steps.check.outputs.regression_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('benchmark-results.json', 'utf-8'));

            const body = [
              `## Performance Regression Detected`,
              ``,
              `**Commit:** ${report.commitSha}`,
              `**Timestamp:** ${report.timestamp}`,
              `**Iterations:** ${report.iterations}`,
              ``,
              `### Regressions`,
              ``,
              ...report.regressions.map(r => `- ${r}`),
              ``,
              `### Full Results`,
              ``,
              `| Metric | Mean | Median | P95 | P99 |`,
              `|--------|------|--------|-----|-----|`,
              ...report.results.map(r =>
                `| ${r.metric} | ${r.mean}${r.unit} | ${r.median}${r.unit} | ${r.p95}${r.unit} | ${r.p99}${r.unit} |`
              ),
              ``,
              `<details><summary>Raw JSON</summary>`,
              ``,
              '```json',
              JSON.stringify(report, null, 2),
              '```',
              `</details>`,
            ].join('\n');

            try {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Performance regression detected (${new Date().toISOString().split('T')[0]})`,
                body,
                labels: ['performance', 'needs-investigation'],
              });
              core.info(`Created regression issue: ${issue.data.html_url}`);
            } catch (error) {
              core.setFailed(`Failed to create regression issue: ${error.message}`);
            }
