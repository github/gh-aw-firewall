name: "Test: gVisor Firewall Comparison (Squid vs Envoy)"
# Comprehensive comparison of network firewall approaches under both runc and gVisor runtimes.
# Tests AWF's current Squid-based approach vs alternative Envoy-based architectures.
#
# NOTE: This workflow intentionally tests HTTPS behavior without HTTPS_PROXY set to validate
# that iptables DNAT fallback causes expected TLS/proxy errors (not successful connections).
# This defense-in-depth check ensures proxy-unaware tools cannot bypass the firewall.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Test 1: Current AWF Approach (Squid + iptables DNAT)
  test-squid-runc:
    name: "Squid + iptables DNAT (runc)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: "Test: Squid forward proxy with iptables DNAT redirect"
        run: |
          set -euo pipefail
          
          # Cleanup function
          cleanup() {
            docker rm -f squid-test 2>/dev/null || true
            docker network rm awf-test 2>/dev/null || true
          }
          trap cleanup EXIT
          
          echo "## Testing Current AWF Architecture (Squid + iptables)"
          echo "Runtime: runc (standard Docker)"
          echo ""
          
          # Create network
          docker network create --subnet=172.30.0.0/24 awf-test
          
          # Start Squid proxy with ACL
          cat > /tmp/squid.conf <<'EOF'
          http_port 3128
          
          # ACL: only allow github.com (leading dot matches domain and all subdomains)
          acl allowed_domains dstdomain .github.com
          http_access allow allowed_domains
          http_access deny all
          
          # Logging
          access_log /var/log/squid/access.log
          EOF
          
          docker run -d --name squid-test \
            --network awf-test --ip 172.30.0.10 \
            -v /tmp/squid.conf:/etc/squid/squid.conf:ro \
            ubuntu/squid:latest
          
          # Wait for Squid to be ready (up to 30 seconds)
          echo "Waiting for Squid to be ready..."
          for i in {1..30}; do
            # Simple TCP port check using netcat (available in busybox)
            if docker run --rm --network awf-test busybox:latest \
              nc -zv -w 2 172.30.0.10 3128 2>&1 | grep -q "open\|succeeded"; then
              echo "✅ Squid is ready (port 3128 listening)"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Squid failed to start within 30 seconds"
              docker logs squid-test
              exit 1
            fi
            sleep 1
          done
          
          # Start agent with iptables DNAT  
          docker run --rm --name agent-test \
            --network awf-test --ip 172.30.0.20 \
            --cap-add=NET_ADMIN \
            -e HTTPS_PROXY=http://172.30.0.10:3128 \
            ubuntu:22.04 bash -c '
              set -euo pipefail
              apt-get update -qq && apt-get install -y -qq iptables curl iputils-ping dnsutils netcat > /dev/null 2>&1
              
              echo "=== Setting up iptables (AWF security model) ==="
              
              # Allow localhost (for MCP stdio servers)
              iptables -I OUTPUT 1 -o lo -j ACCEPT
              
              # Allow DNS to approved resolvers only (simulating --dns-servers)
              iptables -I OUTPUT 2 -p udp --dport 53 -d 8.8.8.8 -j ACCEPT
              iptables -I OUTPUT 3 -p udp --dport 53 -d 8.8.4.4 -j ACCEPT
              iptables -I OUTPUT 4 -p tcp --dport 53 -d 8.8.8.8 -j ACCEPT
              iptables -I OUTPUT 5 -p tcp --dport 53 -d 8.8.4.4 -j ACCEPT
              
              # Allow traffic to Squid proxy itself
              iptables -I OUTPUT 6 -d 172.30.0.10 -j ACCEPT
              
              # DNAT ports 80 and 443 to Squid (defense-in-depth fallback)
              iptables -t nat -A OUTPUT -p tcp --dport 80 -j DNAT --to-destination 172.30.0.10:3128
              iptables -t nat -A OUTPUT -p tcp --dport 443 -j DNAT --to-destination 172.30.0.10:3128
              
              # Block local network access (RFC1918 + Docker networks)
              iptables -A OUTPUT -d 10.0.0.0/8 -j DROP
              iptables -A OUTPUT -d 172.16.0.0/12 -j DROP
              iptables -A OUTPUT -d 192.168.0.0/16 -j DROP
              iptables -A OUTPUT -d 169.254.0.0/16 -j DROP  # link-local
              
              # Block dangerous ports (SSH, databases, etc.)
              for port in 22 23 25 3306 5432 6379 27017 445 1433; do
                iptables -A OUTPUT -p tcp --dport $port -j DROP
              done
              
              # Block ICMP (no ping)
              iptables -A OUTPUT -p icmp -j DROP
              
              # Block all UDP except DNS (already allowed above)
              iptables -A OUTPUT -p udp -j DROP
              
              # Log blocked traffic for forensics (last rule before default policy)
              # iptables -A OUTPUT -j LOG --log-prefix "[FIREWALL BLOCKED] " --log-level 4
              
              echo "✅ iptables rules configured"
              echo "NAT rules:"
              iptables -t nat -L OUTPUT -n -v
              echo ""
              echo "Filter rules:"
              iptables -L OUTPUT -n -v
              echo ""
              
              echo "=== Test 1: Allowed domain via forward proxy (github.com) ==="
              if curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://github.com | grep -q "200\|301\|302"; then
                echo "✅ PASS: github.com accessible"
              else
                echo "❌ FAIL: github.com blocked"
                exit 1
              fi
              
              echo ""
              echo "=== Test 2: Blocked domain via forward proxy (google.com) ==="
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://google.com 2>/dev/null || true)
              if [ "$HTTP_CODE" = "403" ] || [ "$HTTP_CODE" = "000" ] || [ -z "$HTTP_CODE" ]; then
                echo "✅ PASS: google.com blocked (HTTP ${HTTP_CODE:-error})"
              else
                echo "❌ FAIL: google.com accessible (HTTP $HTTP_CODE)"
                exit 1
              fi
              
              echo ""
              echo "=== Test 3: DNAT fallback (proxy-unaware direct HTTPS) ==="
              # Disable proxy env to test DNAT fallback - should cause TLS/proxy error, not success
              unset HTTPS_PROXY
              unset HTTP_PROXY
              if curl -v --max-time 5 https://github.com 2>&1 | grep -qE "(SSL_ERROR|proxy error|Received HTTP|52:|56:)"; then
                echo "✅ PASS: DNAT fallback causes expected TLS/proxy error (not direct egress)"
              else
                # Check if curl succeeded when it should have failed
                if curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://github.com 2>/dev/null | grep -q "200\|301"; then
                  echo "❌ FAIL: Direct HTTPS succeeded - DNAT not enforcing"
                  exit 1
                else
                  echo "✅ PASS: Direct HTTPS failed (DNAT working)"
                fi
              fi
              
              echo ""
              echo "=== Test 4: Blocked port (SSH 22) ==="
              if timeout 3 bash -c "cat < /dev/null > /dev/tcp/github.com/22" 2>/dev/null; then
                echo "❌ FAIL: SSH port accessible"
                exit 1
              else
                echo "✅ PASS: SSH port blocked"
              fi
              
              echo ""
              echo "=== SECURITY TEST 5: IP address bypass ==="
              # Agent should NOT bypass domain ACL by using IP addresses directly
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://8.8.8.8 2>/dev/null || true)
              if [ "$HTTP_CODE" = "403" ] || [ "$HTTP_CODE" = "000" ] || [ -z "$HTTP_CODE" ]; then
                echo "✅ PASS: Direct IP access blocked (HTTP ${HTTP_CODE:-error})"
              else
                echo "❌ FAIL: IP address bypass possible (HTTP $HTTP_CODE)"
                exit 1
              fi
              
              echo ""
              echo "=== SECURITY TEST 6: Subdomain verification ==="
              # Subdomains of allowed domain should work
              if curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://api.github.com | grep -q "200\|301\|302"; then
                echo "✅ PASS: Subdomain api.github.com accessible"
              else
                echo "❌ FAIL: Subdomain blocked incorrectly"
                exit 1
              fi
              
              echo ""
              echo "=== SECURITY TEST 7: Similar domain blocked ==="
              # Similar but different domain should be blocked
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://githubstatus.com 2>/dev/null || true)
              if [ "$HTTP_CODE" = "403" ] || [ "$HTTP_CODE" = "000" ] || [ -z "$HTTP_CODE" ]; then
                echo "✅ PASS: Similar domain githubstatus.com blocked (HTTP ${HTTP_CODE:-error})"
              else
                echo "❌ FAIL: Similar domain bypass possible (HTTP $HTTP_CODE)"
                exit 1
              fi
              
              echo ""
              echo "=== SECURITY TEST 8: Dangerous ports blocked ==="
              # Test comprehensive dangerous port blocklist
              DANGEROUS_PORTS="23 25 3306 5432 6379 27017 445 1433"
              for port in $DANGEROUS_PORTS; do
                if timeout 2 bash -c "cat < /dev/null > /dev/tcp/8.8.8.8/$port" 2>/dev/null; then
                  echo "❌ FAIL: Dangerous port $port accessible"
                  exit 1
                fi
              done
              echo "✅ PASS: All dangerous ports blocked (23,25,3306,5432,6379,27017,445,1433)"
              
              echo ""
              echo "=== SECURITY TEST 9: Local network isolation ==="
              # Should NOT access container gateway or other RFC1918 addresses
              if timeout 2 curl -s http://172.30.0.1 2>/dev/null; then
                echo "❌ FAIL: Container gateway accessible"
                exit 1
              fi
              # Test RFC1918 10.0.0.0/8
              if timeout 2 curl -s http://10.0.0.1 2>/dev/null; then
                echo "❌ FAIL: RFC1918 10.x address accessible"
                exit 1
              fi
              echo "✅ PASS: Local network access blocked"
              
              echo ""
              echo "=== SECURITY TEST 10: Protocol bypass (ICMP) ==="
              # ICMP ping should be blocked (no raw sockets)
              if timeout 2 ping -c 1 8.8.8.8 >/dev/null 2>&1; then
                echo "❌ FAIL: ICMP ping succeeded"
                exit 1
              else
                echo "✅ PASS: ICMP blocked"
              fi
            '
          
          echo ""
          echo "=== Squid access logs ==="
          docker exec squid-test cat /var/log/squid/access.log || echo "(no logs yet)"

  test-squid-gvisor:
    name: "Squid + iptables DNAT (gVisor)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install gVisor
        run: |
          set -euo pipefail
          ARCH=$(uname -m)
          URL="https://storage.googleapis.com/gvisor/releases/release/latest/${ARCH}"
          wget -q "${URL}/runsc" && chmod +x runsc && sudo mv runsc /usr/local/bin/
          cat <<'EOF' | sudo tee /etc/docker/daemon.json
          {"runtimes": {"runsc": {"path": "/usr/local/bin/runsc"}}}
          EOF
          sudo systemctl restart docker && sleep 2

      - name: "Test: Squid with gVisor runtime"
        run: |
          set -euo pipefail
          
          # Cleanup function
          cleanup() {
            docker rm -f squid-gvisor 2>/dev/null || true
            docker network rm awf-test-gvisor 2>/dev/null || true
          }
          trap cleanup EXIT
          
          echo "## Testing Squid + iptables under gVisor"
          echo "Runtime: runsc (gVisor userspace kernel)"
          echo ""
          
          docker network create --subnet=172.30.0.0/24 awf-test-gvisor
          
          # Squid on runc (for compatibility)
          cat > /tmp/squid.conf <<'EOF'
          http_port 3128
          acl allowed_domains dstdomain .github.com
          http_access allow allowed_domains
          http_access deny all
          EOF
          
          docker run -d --name squid-gvisor \
            --network awf-test-gvisor --ip 172.30.0.10 \
            -v /tmp/squid.conf:/etc/squid/squid.conf:ro \
            ubuntu/squid:latest
          
          # Wait for Squid to be ready (up to 30 seconds)
          echo "Waiting for Squid to be ready..."
          for i in {1..30}; do
            # Simple TCP port check using netcat (available in busybox)
            if docker run --rm --network awf-test-gvisor busybox:latest \
              nc -zv -w 2 172.30.0.10 3128 2>&1 | grep -q "open\|succeeded"; then
              echo "✅ Squid is ready (port 3128 listening)"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Squid failed to start within 30 seconds"
              docker logs squid-gvisor
              exit 1
            fi
            sleep 1
          done
          
          # Agent on gVisor with iptables
          docker run --rm --name agent-gvisor \
            --runtime=runsc \
            --network awf-test-gvisor --ip 172.30.0.20 \
            --cap-add=NET_ADMIN \
            -e HTTPS_PROXY=http://172.30.0.10:3128 \
            ubuntu:22.04 bash -c '
              set -euo pipefail
              apt-get update -qq && apt-get install -y -qq iptables curl iputils-ping dnsutils netcat > /dev/null 2>&1
              
              echo "=== Setting up iptables inside gVisor (AWF security model) ==="
              
              # Allow localhost
              iptables -I OUTPUT 1 -o lo -j ACCEPT
              
              # Allow DNS to approved resolvers only
              iptables -I OUTPUT 2 -p udp --dport 53 -d 8.8.8.8 -j ACCEPT
              iptables -I OUTPUT 3 -p udp --dport 53 -d 8.8.4.4 -j ACCEPT
              iptables -I OUTPUT 4 -p tcp --dport 53 -d 8.8.8.8 -j ACCEPT
              iptables -I OUTPUT 5 -p tcp --dport 53 -d 8.8.4.4 -j ACCEPT
              
              # Allow traffic to Squid proxy
              iptables -I OUTPUT 6 -d 172.30.0.10 -j ACCEPT
              
              # DNAT ports 80 and 443 to Squid
              if iptables -t nat -A OUTPUT -p tcp --dport 80 -j DNAT --to-destination 172.30.0.10:3128 2>&1 && \
                 iptables -t nat -A OUTPUT -p tcp --dport 443 -j DNAT --to-destination 172.30.0.10:3128 2>&1; then
                echo "✅ DNAT rules accepted by gVisor"
              else
                echo "❌ CRITICAL: DNAT rules rejected by gVisor"
                exit 1
              fi
              
              # Block local network access
              iptables -A OUTPUT -d 10.0.0.0/8 -j DROP
              iptables -A OUTPUT -d 172.16.0.0/12 -j DROP
              iptables -A OUTPUT -d 192.168.0.0/16 -j DROP
              iptables -A OUTPUT -d 169.254.0.0/16 -j DROP
              
              # Block dangerous ports
              for port in 22 23 25 3306 5432 6379 27017 445 1433; do
                iptables -A OUTPUT -p tcp --dport $port -j DROP
              done
              
              # Block ICMP
              iptables -A OUTPUT -p icmp -j DROP
              
              # Block UDP except DNS
              iptables -A OUTPUT -p udp -j DROP
              
              echo "✅ gVisor iptables configured"
              echo "NAT rules:"
              iptables -t nat -L OUTPUT -n -v
              echo ""
              echo "Filter rules:"
              iptables -L OUTPUT -n -v
              echo ""
              
              echo "=== Test 1: Allowed domain via forward proxy (github.com) ==="
              if curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://github.com | grep -q "200\|301\|302"; then
                echo "✅ PASS: github.com accessible"
              else
                echo "❌ FAIL: github.com blocked"
                exit 1
              fi
              
              echo ""
              echo "=== Test 2: Blocked domain via forward proxy (google.com) ==="
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://google.com 2>/dev/null || true)
              if [ "$HTTP_CODE" = "403" ] || [ "$HTTP_CODE" = "000" ] || [ -z "$HTTP_CODE" ]; then
                echo "✅ PASS: google.com blocked (HTTP ${HTTP_CODE:-error})"
              else
                echo "❌ FAIL: google.com accessible (HTTP $HTTP_CODE)"
                exit 1
              fi
              
              echo ""
              echo "=== Test 3: DNAT fallback (proxy-unaware direct HTTPS) ==="
              unset HTTPS_PROXY
              unset HTTP_PROXY
              if curl -v --max-time 5 https://github.com 2>&1 | grep -qE "(SSL_ERROR|proxy error|Received HTTP|52:|56:)"; then
                echo "✅ PASS: DNAT fallback causes expected TLS/proxy error"
              else
                if curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://github.com 2>/dev/null | grep -q "200\|301"; then
                  echo "❌ FAIL: Direct HTTPS succeeded - DNAT not enforcing"
                  exit 1
                else
                  echo "✅ PASS: Direct HTTPS failed (DNAT working)"
                fi
              fi
              
              # Re-enable proxy env for remaining tests
              export HTTPS_PROXY=http://172.30.0.10:3128
              export HTTP_PROXY=http://172.30.0.10:3128
              
              echo ""
              echo "=== Test 4: Blocked port (SSH 22) ==="
              if timeout 3 bash -c "cat < /dev/null > /dev/tcp/github.com/22" 2>/dev/null; then
                echo "❌ FAIL: SSH port accessible"
                exit 1
              else
                echo "✅ PASS: SSH port blocked"
              fi
              
              echo ""
              echo "=== SECURITY TEST 5: IP address bypass ==="
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://8.8.8.8 2>/dev/null || true)
              if [ "$HTTP_CODE" = "403" ] || [ "$HTTP_CODE" = "000" ] || [ -z "$HTTP_CODE" ]; then
                echo "✅ PASS: Direct IP access blocked (HTTP ${HTTP_CODE:-error})"
              else
                echo "❌ FAIL: IP address bypass possible (HTTP $HTTP_CODE)"
                exit 1
              fi
              
              echo ""
              echo "=== SECURITY TEST 6: Subdomain verification ==="
              if curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://api.github.com | grep -q "200\|301\|302"; then
                echo "✅ PASS: Subdomain api.github.com accessible"
              else
                echo "❌ FAIL: Subdomain blocked incorrectly"
                exit 1
              fi
              
              echo ""
              echo "=== SECURITY TEST 7: Similar domain blocked ==="
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://githubstatus.com 2>/dev/null || true)
              if [ "$HTTP_CODE" = "403" ] || [ "$HTTP_CODE" = "000" ] || [ -z "$HTTP_CODE" ]; then
                echo "✅ PASS: Similar domain githubstatus.com blocked (HTTP ${HTTP_CODE:-error})"
              else
                echo "❌ FAIL: Similar domain bypass possible (HTTP $HTTP_CODE)"
                exit 1
              fi
              
              echo ""
              echo "=== SECURITY TEST 8: Dangerous ports blocked ==="
              DANGEROUS_PORTS="23 25 3306 5432 6379 27017 445 1433"
              for port in $DANGEROUS_PORTS; do
                if timeout 2 bash -c "cat < /dev/null > /dev/tcp/8.8.8.8/$port" 2>/dev/null; then
                  echo "❌ FAIL: Dangerous port $port accessible"
                  exit 1
                fi
              done
              echo "✅ PASS: All dangerous ports blocked (23,25,3306,5432,6379,27017,445,1433)"
              
              echo ""
              echo "=== SECURITY TEST 9: Local network isolation ==="
              if timeout 2 curl -s http://172.30.0.1 2>/dev/null; then
                echo "❌ FAIL: Container gateway accessible"
                exit 1
              fi
              if timeout 2 curl -s http://10.0.0.1 2>/dev/null; then
                echo "❌ FAIL: RFC1918 10.x address accessible"
                exit 1
              fi
              echo "✅ PASS: Local network access blocked"
              
              echo ""
              echo "=== SECURITY TEST 10: Protocol bypass (ICMP) ==="
              if timeout 2 ping -c 1 8.8.8.8 >/dev/null 2>&1; then
                echo "❌ FAIL: ICMP ping succeeded"
                exit 1
              else
                echo "✅ PASS: ICMP blocked"
              fi
              
              echo ""
              echo "=== gVisor Security Test Summary ==="
              echo "✅ All security tests passed under gVisor"
            '

  # Test 2: Envoy Transparent Proxy with iptables
  test-envoy-iptables-runc:
    name: "Envoy + iptables redirect (runc)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: "Test: Envoy transparent proxy with iptables"
        run: |
          set -euo pipefail
          
          # Cleanup function
          cleanup() {
            docker rm -f envoy-test 2>/dev/null || true
            docker network rm envoy-test 2>/dev/null || true
          }
          trap cleanup EXIT
          
          echo "## Testing Envoy with iptables redirect"
          echo "Runtime: runc (standard Docker)"
          echo ""
          echo "NOTE: This test expects HTTPS to fail (Envoy needs CONNECT support for HTTPS)"
          echo ""
          
          docker network create --subnet=172.30.0.0/24 envoy-test
          
          # Create Envoy config for transparent proxying
          cat > /tmp/envoy.yaml <<'EOF'
          static_resources:
            listeners:
            - name: transparent_listener
              address:
                socket_address:
                  address: 0.0.0.0
                  port_value: 15001
              listener_filters:
              - name: envoy.filters.listener.original_dst
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.listener.original_dst.v3.OriginalDst
              filter_chains:
              - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    route_config:
                      name: local_route
                      virtual_hosts:
                      - name: backend
                        domains: ["*"]
                        routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: dynamic_forward_proxy_cluster
                    http_filters:
                    - name: envoy.filters.http.dynamic_forward_proxy
                      typed_config:
                        "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_forward_proxy.v3.FilterConfig
                        dns_cache_config:
                          name: dynamic_forward_proxy_cache_config
                          dns_lookup_family: V4_ONLY
                    - name: envoy.filters.http.router
                      typed_config:
                        "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
            clusters:
            - name: dynamic_forward_proxy_cluster
              lb_policy: CLUSTER_PROVIDED
              cluster_type:
                name: envoy.clusters.dynamic_forward_proxy
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.clusters.dynamic_forward_proxy.v3.ClusterConfig
                  dns_cache_config:
                    name: dynamic_forward_proxy_cache_config
                    dns_lookup_family: V4_ONLY
          admin:
            address:
              socket_address:
                address: 0.0.0.0
                port_value: 9901
          EOF
          
          # Start Envoy
          docker run -d --name envoy-test \
            --network envoy-test --ip 172.30.0.10 \
            -v /tmp/envoy.yaml:/etc/envoy/envoy.yaml:ro \
            envoyproxy/envoy:v1.28-latest \
            -c /etc/envoy/envoy.yaml
          
          # Wait for Envoy to be ready (check admin port up to 30 seconds)
          echo "Waiting for Envoy to be ready..."
          for i in {1..30}; do
            if docker run --rm --network envoy-test curlimages/curl:latest \
              curl -s -o /dev/null -w "%{http_code}" http://172.30.0.10:9901/ready | grep -q "200"; then
              echo "✅ Envoy is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Envoy failed to start within 30 seconds"
              docker logs envoy-test
              exit 1
            fi
            sleep 1
          done
          
          # Agent with iptables redirect to Envoy
          docker run --rm --name agent-envoy \
            --network envoy-test --ip 172.30.0.20 \
            --cap-add=NET_ADMIN \
            ubuntu:22.04 bash -c '
              set -euo pipefail
              apt-get update -qq && apt-get install -y -qq iptables curl > /dev/null 2>&1
              
              echo "=== Configuring iptables redirect to Envoy ==="
              iptables -t nat -A OUTPUT -p tcp --dport 80 -j DNAT --to-destination 172.30.0.10:15001
              iptables -t nat -A OUTPUT -p tcp --dport 443 -j DNAT --to-destination 172.30.0.10:15001
              iptables -I OUTPUT 1 -o lo -j ACCEPT
              
              echo "✅ iptables configured for Envoy"
              iptables -t nat -L OUTPUT -n -v
              
              echo ""
              echo "=== Testing HTTP through Envoy ==="
              if curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://example.com | grep -q "200"; then
                echo "✅ PASS: HTTP works through Envoy"
              else
                echo "❌ FAIL: HTTP failed"
                exit 1
              fi
              
              echo ""
              echo "=== Testing HTTPS through Envoy (expected to fail) ==="
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://github.com 2>&1 || echo "000")
              if [ "$HTTP_CODE" = "000" ] || [ "$HTTP_CODE" = "503" ]; then
                echo "✅ EXPECTED: HTTPS fails without CONNECT support (HTTP $HTTP_CODE)"
              elif [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ]; then
                echo "⚠️  UNEXPECTED: HTTPS succeeded (HTTP $HTTP_CODE) - config may differ from expected"
              else
                echo "⚠️  HTTPS returned unexpected code: $HTTP_CODE"
              fi
            '

  test-envoy-gvisor:
    name: "Envoy + iptables redirect (gVisor)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install gVisor
        run: |
          set -euo pipefail
          ARCH=$(uname -m)
          URL="https://storage.googleapis.com/gvisor/releases/release/latest/${ARCH}"
          wget -q "${URL}/runsc" && chmod +x runsc && sudo mv runsc /usr/local/bin/
          cat <<'EOF' | sudo tee /etc/docker/daemon.json
          {"runtimes": {"runsc": {"path": "/usr/local/bin/runsc"}}}
          EOF
          sudo systemctl restart docker && sleep 2

      - name: "Test: Envoy under gVisor"
        run: |
          set -euo pipefail
          
          # Cleanup function
          cleanup() {
            docker rm -f envoy-gvisor 2>/dev/null || true
            docker network rm envoy-gvisor 2>/dev/null || true
          }
          trap cleanup EXIT
          
          echo "## Testing Envoy + iptables under gVisor"
          echo ""
          
          docker network create --subnet=172.30.0.0/24 envoy-gvisor
          
          # Envoy config (same as runc test - with dynamic_forward_proxy)
          cat > /tmp/envoy.yaml <<'EOF'
          static_resources:
            listeners:
            - name: listener
              address:
                socket_address: { address: 0.0.0.0, port_value: 15001 }
              listener_filters:
              - name: envoy.filters.listener.original_dst
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.listener.original_dst.v3.OriginalDst
              filter_chains:
              - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress
                    route_config:
                      virtual_hosts:
                      - name: backend
                        domains: ["*"]
                        routes:
                        - match: { prefix: "/" }
                          route: { cluster: dynamic_forward_proxy_cluster }
                    http_filters:
                    - name: envoy.filters.http.dynamic_forward_proxy
                      typed_config:
                        "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_forward_proxy.v3.FilterConfig
                        dns_cache_config:
                          name: dynamic_forward_proxy_cache_config
                          dns_lookup_family: V4_ONLY
                    - name: envoy.filters.http.router
                      typed_config:
                        "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
            clusters:
            - name: dynamic_forward_proxy_cluster
              lb_policy: CLUSTER_PROVIDED
              cluster_type:
                name: envoy.clusters.dynamic_forward_proxy
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.clusters.dynamic_forward_proxy.v3.ClusterConfig
                  dns_cache_config:
                    name: dynamic_forward_proxy_cache_config
                    dns_lookup_family: V4_ONLY
          admin:
            address:
              socket_address: { address: 0.0.0.0, port_value: 9901 }
          EOF
          
          docker run -d --name envoy-gvisor \
            --network envoy-gvisor --ip 172.30.0.10 \
            -v /tmp/envoy.yaml:/etc/envoy/envoy.yaml:ro \
            envoyproxy/envoy:v1.28-latest -c /etc/envoy/envoy.yaml
          
          # Wait for Envoy to be ready (check admin port up to 30 seconds)
          echo "Waiting for Envoy to be ready..."
          for i in {1..30}; do
            if docker run --rm --network envoy-gvisor curlimages/curl:latest \
              curl -s -o /dev/null -w "%{http_code}" http://172.30.0.10:9901/ready | grep -q "200"; then
              echo "✅ Envoy is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Envoy failed to start within 30 seconds"
              docker logs envoy-gvisor
              exit 1
            fi
            sleep 1
          done
          
          # Agent on gVisor
          docker run --rm --runtime=runsc \
            --network envoy-gvisor --ip 172.30.0.20 \
            --cap-add=NET_ADMIN \
            ubuntu:22.04 bash -c '
              set -euo pipefail
              apt-get update -qq && apt-get install -y -qq iptables curl > /dev/null 2>&1
              
              echo "=== Configuring iptables under gVisor for Envoy ==="
              if iptables -t nat -A OUTPUT -p tcp --dport 80 -j DNAT --to-destination 172.30.0.10:15001 2>&1; then
                echo "✅ iptables rule accepted by gVisor"
                
                echo ""
                echo "=== Testing connectivity ==="
                if curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://example.com | grep -q "200"; then
                  echo "✅ PASS: Envoy works under gVisor"
                else
                  echo "❌ FAIL: Connectivity issues"
                  exit 1
                fi
              else
                echo "❌ FAIL: iptables rejected by gVisor"
                exit 1
              fi
            '

  # Test 3: Performance Comparison
  performance-comparison:
    name: "Performance: Squid vs Envoy"
    needs: [test-squid-runc, test-envoy-iptables-runc]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      squid_latency: ${{ steps.squid-perf.outputs.latency }}
      envoy_latency: ${{ steps.envoy-perf.outputs.latency }}
    steps:
      - name: "Benchmark: Squid latency"
        id: squid-perf
        run: |
          set -euo pipefail
          
          # Cleanup function
          cleanup() {
            docker rm -f squid-perf 2>/dev/null || true
            docker network rm squid-perf 2>/dev/null || true
          }
          trap cleanup EXIT
          
          echo "## Performance Test: Squid"
          
          docker network create squid-perf
          
          cat > /tmp/squid.conf <<'EOF'
          http_port 3128
          http_access allow all
          EOF
          
          docker run -d --name squid-perf \
            --network squid-perf \
            -v /tmp/squid.conf:/etc/squid/squid.conf:ro \
            ubuntu/squid:latest
          
          # Wait for Squid to be ready (up to 30 seconds)
          echo "Waiting for Squid to be ready..."
          for i in {1..30}; do
            # Simple TCP port check using netcat (available in busybox)
            if docker run --rm --network squid-perf busybox:latest \
              nc -zv -w 2 squid-perf 3128 2>&1 | grep -q "open\|succeeded"; then
              echo "✅ Squid is ready (port 3128 listening)"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Squid failed to start within 30 seconds"
              docker logs squid-perf
              exit 1
            fi
            sleep 1
          done
          
          # Run 100 requests and measure latency
          AVG=$(docker run --rm --network squid-perf \
            ubuntu:22.04 bash -c '
              set -euo pipefail
              apt-get update -qq && apt-get install -y -qq curl > /dev/null 2>&1
              
              echo "Running 100 requests through Squid..." >&2
              TOTAL=0
              for i in {1..100}; do
                START=$(date +%s%N)
                curl -x squid-perf:3128 -s -o /dev/null --max-time 5 http://example.com
                END=$(date +%s%N)
                LATENCY=$(( (END - START) / 1000000 ))
                TOTAL=$((TOTAL + LATENCY))
              done
              AVG=$((TOTAL / 100))
              echo "$AVG"
            ')
          
          echo "Average latency: ${AVG}ms"
          echo "latency=${AVG}" >> $GITHUB_OUTPUT

      - name: "Benchmark: Envoy latency"
        id: envoy-perf
        run: |
          set -euo pipefail
          
          # Cleanup function
          cleanup() {
            docker rm -f envoy-perf 2>/dev/null || true
            docker network rm envoy-perf 2>/dev/null || true
          }
          trap cleanup EXIT
          
          echo "## Performance Test: Envoy"
          
          docker network create envoy-perf
          
          cat > /tmp/envoy.yaml <<'EOF'
          static_resources:
            listeners:
            - name: listener
              address: { socket_address: { address: 0.0.0.0, port_value: 10000 } }
              filter_chains:
              - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress
                    route_config:
                      virtual_hosts:
                      - name: backend
                        domains: ["*"]
                        routes:
                        - match: { prefix: "/" }
                          route: { cluster: example_cluster }
                    http_filters:
                    - name: envoy.filters.http.router
                      typed_config:
                        "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
            clusters:
            - name: example_cluster
              type: LOGICAL_DNS
              dns_lookup_family: V4_ONLY
              load_assignment:
                cluster_name: example_cluster
                endpoints:
                - lb_endpoints:
                  - endpoint:
                      address: { socket_address: { address: example.com, port_value: 80 } }
          admin:
            address: { socket_address: { address: 0.0.0.0, port_value: 9901 } }
          EOF
          
          docker run -d --name envoy-perf \
            --network envoy-perf \
            -v /tmp/envoy.yaml:/etc/envoy/envoy.yaml:ro \
            envoyproxy/envoy:v1.28-latest -c /etc/envoy/envoy.yaml
          
          # Wait for Envoy to be ready (check admin port up to 30 seconds)
          echo "Waiting for Envoy to be ready..."
          for i in {1..30}; do
            if docker run --rm --network envoy-perf curlimages/curl:latest \
              curl -s -o /dev/null -w "%{http_code}" http://envoy-perf:9901/ready | grep -q "200"; then
              echo "✅ Envoy is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Envoy failed to start within 30 seconds"
              docker logs envoy-perf
              exit 1
            fi
            sleep 1
          done
          
          # Run 100 requests and measure latency
          AVG=$(docker run --rm --network envoy-perf \
            ubuntu:22.04 bash -c '
              set -euo pipefail
              apt-get update -qq && apt-get install -y -qq curl > /dev/null 2>&1
              
              echo "Running 100 requests through Envoy..." >&2
              TOTAL=0
              for i in {1..100}; do
                START=$(date +%s%N)
                curl -s -o /dev/null --max-time 5 http://envoy-perf:10000
                END=$(date +%s%N)
                LATENCY=$(( (END - START) / 1000000 ))
                TOTAL=$((TOTAL + LATENCY))
              done
              AVG=$((TOTAL / 100))
              echo "$AVG"
            ')
          
          echo "Average latency: ${AVG}ms"
          echo "latency=${AVG}" >> $GITHUB_OUTPUT

      - name: "Compare results"
        run: |
          echo "## Performance Comparison Summary"
          echo ""
          echo "| Proxy | Avg Latency |"
          echo "|-------|-------------|"
          echo "| Squid | ${{ steps.squid-perf.outputs.latency }}ms |"
          echo "| Envoy | ${{ steps.envoy-perf.outputs.latency }}ms |"

  # Summary Report
  summary:
    name: "Summary Report"
    needs: [test-squid-runc, test-squid-gvisor, test-envoy-iptables-runc, test-envoy-gvisor, performance-comparison]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: "Generate report"
        run: |
          cat <<'EOF'
          # gVisor Firewall Comparison: Squid vs Envoy
          
          ## Test Results
          
          ### Approach 1: Squid + iptables DNAT (Current AWF)
          - **runc**: ${{ needs.test-squid-runc.result }}
          - **gVisor**: ${{ needs.test-squid-gvisor.result }}
          
          ### Approach 2: Envoy + iptables redirect (HTTP only)
          - **runc**: ${{ needs.test-envoy-iptables-runc.result }}
          - **gVisor**: ${{ needs.test-envoy-gvisor.result }}
          
          ### Performance
          - **Squid avg latency**: ${{ needs.performance-comparison.outputs.squid_latency }}ms
          - **Envoy avg latency**: ${{ needs.performance-comparison.outputs.envoy_latency }}ms
          - **Status**: ${{ needs.performance-comparison.result }}
          
          ## Key Findings
          
          ### Squid Approach
          - ✅ Mature, well-tested L7 proxy
          - ✅ Excellent ACL/domain filtering
          - ✅ Standard forward proxy (CONNECT for HTTPS)
          - ✅ iptables DNAT defense-in-depth causes TLS error for proxy-unaware tools (not direct egress)
          - ❓ iptables DNAT compatibility with gVisor determined by test results above
          
          ### Envoy Approach
          - ✅ Modern, high-performance proxy
          - ✅ Rich observability and metrics
          - ✅ Native transparent proxy support for HTTP
          - ⚠️  HTTPS requires additional CONNECT handling configuration (not tested here)
          - ⚠️  Domain filtering requires additional configuration
          - ❓ iptables redirect compatibility with gVisor determined by test results above
          
          ## Recommendations
          
          See individual job logs for detailed test output and performance metrics.
          
          If Squid + gVisor test passed: AWF can continue with current architecture
          If Squid + gVisor failed but Envoy + gVisor passed: Consider Envoy migration (with HTTPS CONNECT support)
          If both failed: Investigate alternatives (host-level iptables, PROXY protocol, etc.)
          
          EOF
